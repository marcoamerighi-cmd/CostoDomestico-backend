<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tracking Admin</title>

<style>
body{
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f6f9;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 4px 16px rgba(0,0,0,.1);
max-width:350px;
}

button{
background:#1f3c88;
color:white;
border:none;
padding:14px 22px;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>Esclusione Tracking Admin</h2>

<p>
Questo dispositivo non verrà conteggiato nella dashboard.
</p>

<button onclick="attiva()">
Attiva esclusione
</button>

</div>

<script>

function attiva(){

localStorage.setItem(
    "escludi_tracking",
    "si"
);

alert(
    "Tracking disattivato su questo dispositivo"
);

}

</script>

</body>
</html>
