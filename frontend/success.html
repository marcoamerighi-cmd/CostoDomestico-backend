<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento completato</title>
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      text-align: center;
      padding: 24px;
      color: #1f2937;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 18px;
      max-width: 520px;
      margin: 30px auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .brand {
      font-size: 28px;
      font-weight: 800;
      color: #0b4dbb;
      margin-bottom: 18px;
    }

    .brand span {
      color: #16a34a;
    }

    h1 {
      color: #16a34a;
      margin-bottom: 10px;
    }

    p {
      line-height: 1.5;
      color: #374151;
    }

    button {
      margin-top: 20px;
      padding: 16px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #16a34a;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: #2563eb;
      margin-top: 12px;
    }

    .small {
      margin-top: 15px;
      font-size: 14px;
      color: #6b7280;
    }

    .notice {
      margin-top: 18px;
      background: #ecfdf5;
      border: 1px solid #86efac;
      color: #065f46;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="box">
    <div class="brand">CostoDomestico<span>.it</span></div>

    <h1>Pagamento completato ✅</h1>

    <p>Il tuo report è pronto.</p>

    <div class="notice">
      Ti stiamo riportando al calcolatore. Da lì potrai scaricare il PDF.
    </div>

    <button onclick="tornaAlCalcolatore(true)">
      Scarica il report PDF
    </button>

    <button class="secondary" onclick="tornaAlCalcolatore(false)">
      Torna al calcolatore
    </button>

    <p class="small">
      Se il download non parte automaticamente, premi il pulsante verde.
    </p>
  </div>

  <script>
    let redirectEseguito = false;

    function salvaOrdineCostoDomestico() {

      if (localStorage.getItem("ordine_costo_domestico_salvato") === "1") {
        return;
      }

      localStorage.setItem(
        "ordine_costo_domestico_salvato",
        "1"
      );

      fetch("https://costodomestico-backend.onrender.com/salva-ordine-costo-domestico", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email_cliente: localStorage.getItem("email_cliente") || "",
          nome_cliente: localStorage.getItem("nome_cliente") || "",
          cognome_cliente: localStorage.getItem("cognome_cliente") || ""
        })
      }).catch(function(error) {
        console.log("Errore salvataggio ordine:", error);
      });
    }

    function tornaAlCalcolatore(downloadAutomatico = false) {

      salvaOrdineCostoDomestico();

      if (redirectEseguito && downloadAutomatico) {
        return;
      }

      if (downloadAutomatico) {
        redirectEseguito = true;
      }

      const url = downloadAutomatico
        ? "https://costodomestico.it/?paid=1&download=1&success=1"
        : "https://costodomestico.it/?paid=1&success=1";

      window.location.href = url;
    }

    setTimeout(() => {
      tornaAlCalcolatore(true);
    }, 3000);
  </script>

</body>
</html>
