<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Area Cliente - CostoDomestico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 30px 16px;
            color: #333;
            margin: 0;
        }

        .container {
            max-width: 1050px;
            margin: auto;
            background: white;
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        }

        .brand {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #0b4dbb;
            margin-bottom: 10px;
        }

        .brand span {
            color: #16a34a;
        }

        h1 {
            color: #1f3c88;
            text-align: center;
            margin: 8px 0;
        }

        .intro {
            text-align: center;
            color: #555;
            margin-bottom: 24px;
        }

        .login-box {
            background: #f8fafc;
            border: 1px solid #dbe3ec;
            padding: 22px;
            border-radius: 14px;
            margin-bottom: 24px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            padding: 14px 20px;
            background: #1f3c88;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #162d66;
        }

        .btn-download {
            margin: 0;
            padding: 10px 14px;
            background: #16a34a;
            font-size: 14px;
            border-radius: 8px;
        }

        .btn-download:hover {
            background: #0f7a35;
        }

        .summary {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin: 24px 0;
        }

        .card {
            background: #f8fafc;
            border: 1px solid #dbe3ec;
            border-radius: 14px;
            padding: 18px;
            text-align: center;
        }

        .card strong {
            display: block;
            color: #1f3c88;
            font-size: 24px;
            margin-top: 6px;
        }

        .filters {
            display: none;
            margin: 18px 0;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 18px;
            min-width: 780px;
        }

        th {
            background: #1f3c88;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: middle;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }

        .badge-ok {
            background: #dcfce7;
            color: #166534;
        }

        .badge-wait {
            background: #fef3c7;
            color: #92400e;
        }

        .msg {
            margin-top: 18px;
            color: #666;
            text-align: center;
        }

        .empty {
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #9a3412;
            padding: 14px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
        }

        @media (max-width: 700px) {
            .container {
                padding: 22px;
            }

            .summary {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="brand">CostoDomestico<span>.it</span></div>

    <h1>Area Cliente</h1>

    <p class="intro">
        Accedi con la tua email per consultare i report acquistati e scaricare nuovamente i PDF.
    </p>

    <div class="login-box">
        <input
    type="email"
    id="email_cliente"
    placeholder="Inserisci la tua email"
    onkeypress="gestisciInvio(event)"
    autocomplete="email"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
    inputmode="email"
>

        <button onclick="richiediMagicLink()" style="background:#16a34a;">
    Ricevi link di accesso via email
</button>

    </div>

    <div id="messaggio" class="msg"></div>

    <div id="summary" class="summary">
        <div class="card">
            Report totali
            <strong id="totale_report">0</strong>
        </div>

        <div class="card">
            Totale speso
            <strong id="totale_speso">€ 0,00</strong>
        </div>

        <div class="card">
            PDF disponibili
            <strong id="pdf_disponibili">0</strong>
        </div>
    </div>

    <div id="filters" class="filters">
        <select id="filtro_prodotto" onchange="renderizzaOrdini()">
            <option value="">Tutti i report</option>
            <option value="Costo Domestico">Costo Domestico</option>
            <option value="TFR">TFR</option>
        </select>
    </div>

    <div class="table-wrap">
        <table id="tabella" style="display:none;">
            <thead>
                <tr>
                    <th>Prodotto</th>
                    <th>Importo</th>
                    <th>Stato</th>
                    <th>Data</th>
                    <th>Report</th>
                </tr>
            </thead>

            <tbody id="ordini_cliente"></tbody>
        </table>
    </div>

</div>

<script>
    let ordiniCliente = [];
    let storicoCalcoli = [];

    async function richiediMagicLink() {

        document.activeElement.blur();

    const email = document.getElementById("email_cliente").value.trim();

    if (!email) {
        document.getElementById("messaggio").innerText =
            "Inserisci prima la tua email.";
        return;
    }

    document.getElementById("messaggio").innerText =
        "Generazione link di accesso in corso...";

    const risposta = await fetch(
        "/richiedi-magic-link",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email
            })
        }
    );

    const dati = await risposta.json();

    if (!dati.success) {
        document.getElementById("messaggio").innerText =
            dati.errore || "Errore durante la generazione del link.";
        return;
    }

    document.getElementById("messaggio").innerHTML =
        `
        Link generato correttamente.<br>
        <a href="${dati.magic_link}" style="color:#1f3c88; font-weight:bold;">
            Apri area cliente con Magic Link
        </a>
        `;
}

    function gestisciInvio(event) {
        if (event.key === "Enter") {
            cercaOrdiniCliente();
        }
    }

    function formattaData(data) {
        if (!data) {
            return "-";
        }

        const dataObj = new Date(data);

        if (isNaN(dataObj.getTime())) {
            return data;
        }

        return dataObj.toLocaleDateString("it-IT", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric"
        });
    }

    function badgeStato(stato) {
        if (stato === "pagato") {
            return `<span class="badge badge-ok">Pagato</span>`;
        }

        return `<span class="badge badge-wait">${stato || "Da verificare"}</span>`;
    }

    function prodottoNormalizzato(prodotto) {
        const p = (prodotto || "").toLowerCase();

        if (p.includes("tfr")) {
            return "TFR";
        }

        return "Costo Domestico";
    }

    async function cercaOrdiniCliente() {
        const email = document.getElementById("email_cliente").value.trim();

        if (!email) {
            document.getElementById("messaggio").innerText =
                "Inserisci una email valida.";
            return;
        }

        document.getElementById("messaggio").innerText =
            "Caricamento report in corso...";

        const risposta = await fetch(
            "/ordini-cliente?email=" +
            encodeURIComponent(email)
        );

        ordiniCliente = await risposta.json();
        const rispostaStorico = await fetch(
    "/storico-calcoli?email=" +
    encodeURIComponent(email)
);

storicoCalcoli = await rispostaStorico.json();

        if (ordiniCliente.length === 0) {
            document.getElementById("tabella").style.display = "none";
            document.getElementById("summary").style.display = "none";
            document.getElementById("filters").style.display = "none";
            document.getElementById("messaggio").innerHTML =
                `<div class="empty">Nessun report trovato per questa email.</div>`;
            return;
        }

        document.getElementById("summary").style.display = "grid";
        document.getElementById("filters").style.display = "block";
        document.getElementById("tabella").style.display = "table";

        aggiornaRiepilogo();
        renderizzaOrdini();
        mostraStoricoCalcoli();

        document.getElementById("messaggio").innerText =
            "Report trovati: " + ordiniCliente.length;
    }

    function aggiornaRiepilogo() {
        const totaleReport = ordiniCliente.length;

        const totaleSpeso = ordiniCliente.reduce((totale, ordine) => {
            return totale + Number(ordine.importo || 0);
        }, 0);

        const pdfDisponibili = ordiniCliente.filter(
            ordine => ordine.pdf_file
        ).length;

        document.getElementById("totale_report").innerText =
            totaleReport;

        document.getElementById("totale_speso").innerText =
            "€ " + totaleSpeso.toFixed(2).replace(".", ",");

        document.getElementById("pdf_disponibili").innerText =
            pdfDisponibili;
    }

    function renderizzaOrdini() {
        const corpo = document.getElementById("ordini_cliente");
        const filtro = document.getElementById("filtro_prodotto").value;

        corpo.innerHTML = "";

        const ordiniFiltrati = ordiniCliente.filter(ordine => {
            if (!filtro) {
                return true;
            }

            return prodottoNormalizzato(ordine.prodotto) === filtro;
        });

        if (ordiniFiltrati.length === 0) {
            corpo.innerHTML = `
                <tr>
                    <td colspan="5" style="text-align:center; color:#666;">
                        Nessun report presente per questo filtro.
                    </td>
                </tr>
            `;
            return;
        }

        ordiniFiltrati.forEach(ordine => {
            corpo.innerHTML += `
                <tr>
                    <td>${prodottoNormalizzato(ordine.prodotto)}</td>
                    <td>€ ${Number(ordine.importo || 0).toFixed(2)}</td>
                    <td>${badgeStato(ordine.stato)}</td>
                    <td>${formattaData(ordine.data_ordine)}</td>
                    <td>
    ${
        ordine.pdf_file
        ? `
            <a href="/download-pdf/${ordine.id}">
                <button class="btn-download">
                    Scarica PDF
                </button>
            </a>
        `
        : `
            <button
                class="btn-download"
                style="background:#f59e0b;"
                onclick="rigeneraPdf('${prodottoNormalizzato(ordine.prodotto)}', '${ordine.sessione_stripe}')"
            >
                Recupera PDF
            </button>

            <br>

            <small style="color:#777;">
                Il report verrà rigenerato automaticamente.
            </small>
        `
    }
</td>
</tr>
`;
});
}

function mostraStoricoCalcoli() {

    if (storicoCalcoli.length === 0) {
        return;
    }

    const container = document.querySelector(".container");

    let html = `
    <div style="
        margin-top:40px;
        border-top:2px solid #eee;
        padding-top:25px;
    ">

    <h2 style="color:#1f3c88;">
        Storico Calcoli
    </h2>
    `;

    storicoCalcoli.forEach(calcolo => {

        html += `
        <div style="
            border:1px solid #ddd;
            border-radius:12px;
            padding:15px;
            margin-bottom:12px;
            background:#fafafa;
        ">
            <strong>${calcolo.tipo}</strong><br>

            ${calcolo.titolo}<br>

            <small>
                ${calcolo.dettaglio}
            </small><br>

            <strong>
            € ${Number(calcolo.importo).toFixed(2)}
            </strong>
        </div>
        `;
    });

    html += "</div>";

    const vecchio =
        document.getElementById(
            "storico-calcoli-box"
        );

    if (vecchio) {
        vecchio.remove();
    }

    const div = document.createElement("div");

    div.id = "storico-calcoli-box";
    div.innerHTML = html;

    container.appendChild(div);
}

async function verificaTokenDaUrl() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
        return;
    }

    document.getElementById("messaggio").innerText =
        "Verifica accesso in corso...";

    const risposta = await fetch(
        "/verifica-magic-link?token=" + encodeURIComponent(token)
    );

    const dati = await risposta.json();

    if (!dati.success) {
        document.getElementById("messaggio").innerText =
            "Link non valido o scaduto.";
        return;
    }

    document.getElementById("email_cliente").value =
        dati.cliente.email;

    cercaOrdiniCliente();
}

verificaTokenDaUrl();
function rigeneraPdf(tipo, sessioneStripe) {

    if (!sessioneStripe) {
        alert("Sessione pagamento non trovata.");
        return;
    }

    if (tipo === "TFR") {
        window.location.href =
            "/download_report.html?session_id=" + encodeURIComponent(sessioneStripe);
        return;
    }

    window.location.href =
        "/download-costo-domestico?session_id=" + encodeURIComponent(sessioneStripe);
}
</script>

</body>
</html>
